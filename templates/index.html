<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluffelAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        .my-form {
            position: fixed;
            bottom: 24px;
            right: 80px;
            left: 80px;
            width: calc(100% - 160px);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" style="background-color: #081534;">
        <div class="container-fluid">
            <a class="navbar-brand mb-0 h1" style="color: #fff;">FluffelAI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDarkDropdown" aria-controls="navbarNavDarkDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <form class="d-flex justify-content-end" action="{{ url_for('clear_messages') }}" method="POST" style="display: inline;">
                <button type="submit" 
                        onclick="return confirm('Möchtest du wirklich alle Nachrichten löschen?');" 
                        style="background-color: #ff4d4d; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px;">
                    Datenbank leeren
                </button>
            </form>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNavDarkDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <button class="btn dropdown-toggle" style="color: #fff;" data-bs-toggle="dropdown" aria-expanded="false">
                            Menü
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                            <li><a class="dropdown-item" href="{{url_for('profile')}}">Profil</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li><a class="dropdown-item" href="{{url_for('logout')}}">Ausloggen</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    

    <div class="container">
        <!-- Begrüßungs-Nachricht -->
        <div class="d-flex justify-content-start mt-3">
            <div class="card" >
                <div class="card-body">
                    Hi {{ current_user.username }}! Wie kann ich dir helfen?
                </div>
            </div>
        </div>

        {% for msg in messages %}
        <div class="d-flex {% if name == msg.user %} justify-content-end {% else %} justify-content-start {% endif %} mt-3">
            <div class="card" >
                <div class="card-body">
                    {{ msg.content }}
                </div>
            </div>
        </div>
        {% endfor %}


        <form class="input-group mb-3 my-form" action="" method="POST">
            <input type="text" name="content" class="form-control" placeholder="Stelle irgendeine Frage...">
            <button class="btn btn-outline-secondary" type="submit">Senden</button>
        </form>

    </div>
</body>
</html>
